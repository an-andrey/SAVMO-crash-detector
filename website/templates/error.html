{% extends "layout.html" %} {% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
  <div class="text-center">
    <h1 class="text-9xl font-extrabold text-indigo-600 opacity-50">
      {{ error_code }}
    </h1>
    <div class="relative -mt-12">
      <h2 class="text-4xl font-bold text-white mb-4">Oops!</h2>
      <p class="text-xl text-gray-400 mb-8">{{ error_message }}</p>

      <div class="space-x-4">
        <a
          href="{{ url_for('home') }}"
          class="inline-block px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md transition font-medium"
        >
          Go Home
        </a>
        <a
          href="#"
          onclick="history.back()"
          class="inline-block px-6 py-3 bg-gray-700 hover:bg-gray-600 text-white rounded-md transition font-medium"
        >
          Go Back
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
